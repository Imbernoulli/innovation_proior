h-600.jpg 448w,https://www.pbs.org/wgbh/nova/media/images/sophie-germain-01.width-400.jpg 400w,https://www.pbs.org/wgbh/nova/media/images/sophie-germain-01.width-300.jpg 300w" sizes="(max-width: 448px) 100vw, 448px" loading="lazy" class="jsx-3514728088 "/></figure><div class="jsx-205c15a8a00bb4a8 info"><h3 class="jsx-205c15a8a00bb4a8">Math&#x27;s Hidden Woman</h3></div></span></a><a class="link-reset" href="/wgbh/nova/article/computers-making-inroads-in-field-of-mathematics/"><span class="jsx-205c15a8a00bb4a8 link"><figure class="jsx-205c15a8a00bb4a8"><img src="/wgbh/nova/_next/static/images/default-7bedc9529e5eedc25a4dcbe4d0877403.png" class="jsx-205c15a8a00bb4a8"/></figure><div class="jsx-205c15a8a00bb4a8 info"><h3 class="jsx-205c15a8a00bb4a8">Computers making inroads in field of mathematics</h3></div></span></a><a class="link-reset" href="/wgbh/nova/article/mathematics-pipeline-uncommon-dialogue/"><span class="jsx-205c15a8a00bb4a8 link"><figure class="jsx-205c15a8a00bb4a8"><img src="https://www.pbs.org/wgbh/nova/media/images/mathematics-pipeline-uncommon-dialogue.width-800.jpg" alt="" srcSet="https://www.pbs.org/wgbh/nova/media/images/mathematics-pipeline-uncommon-dialogue.width-800.jpg 617w,https://www.pbs.org/wgbh/nova/media/images/mathematics-pipeline-uncommon-dialogue.width-600.jpg 600w,https://www.pbs.org/wgbh/nova/media/images/mathematics-pipeline-uncommon-dialogue.width-400.jpg 400w,https://www.pbs.org/wgbh/nova/media/images/mathematics-pipeline-uncommon-dialogue.width-300.jpg 300w" sizes="(max-width: 617px) 100vw, 617px" loading="lazy" class="jsx-3514728088 "/></figure><div class="jsx-205c15a8a00bb4a8 info"><h3 class="jsx-205c15a8a00bb4a8">The Mathematics Pipeline and Student Diversity: An Uncommon Dialogue</h3></div></span></a></div>
<p>Andrew Wiles devoted much of his career to proving Fermat&#x27;s Last Theorem, a challenge that perplexed the best minds in mathematics for 300 years. In 1993, he made front-page headlines when he announced a proof of the problem, but this was not the end of the story; an error in his calculation jeopardized his life&#x27;s work. In this interview, Wiles recounts how he came to terms with the mistake, and eventually went on to achieve his life&#x27;s ambition.</p>
<p><b>NOVA: Many great scientific discoveries are the result of obsession, but in your case that obsession has held you since you were a child.</b></p><p>ANDREW WILES: I grew up in Cambridge in England, and my love of mathematics dates from those early childhood days. I loved doing problems in school. I&#x27;d take them home and make up new ones of my own. But the best problem I ever found, I found in my local public library. I was just browsing through the section of math books and I found this one book, which was all about one particular problem—Fermat&#x27;s Last Theorem. This problem had been unsolved by mathematicians for 300 years. It looked so simple, and yet all the great mathematicians in history couldn&#x27;t solve it. Here was a problem, that I, a 10 year old, could understand, and I knew from that moment that I would never let it go. I had to solve it.</p><p><b>Who was Fermat and what was his Last Theorem?</b></p><p>Fermat was a 17th-century mathematician who wrote a note in the margin of his book stating a particular proposition and claiming to have proved it. His proposition was about an equation which is closely related to Pythagoras&#x27; equation. Pythagoras&#x27; equation gives you:</p><p><i>x</i>2 + <i>y</i>2 = <i>z</i>2</p><p>You can ask, what are the whole number solutions to this equation, and you can see that:</p><p>32 + 42 = 52</p><p>and</p><p>52 + 122 = 132</p><p>And if you go on looking then you find more and more such solutions. Fermat then considered the cubed version of this equation:</p><p><i>x</i>3 + <i>y</i>3 = <i>z</i>3</p><p>He raised the question: Can you find solutions to the cubed equation? He claimed that there were none. In fact, he claimed that for the general family of equations:</p><p><i>x</i>n + <i>y</i>n = <i>z</i>n where n is bigger than 2</p><p>it is impossible to find a solution. That&#x27;s Fermat&#x27;s Last Theorem.</p><p><b>So Fermat said because he could not find any solutions to this equation, then there were no solutions?</b></p><p>He did more than that. Just because we can&#x27;t find a solution it doesn&#x27;t mean that there isn&#x27;t one. Mathematicians aren&#x27;t satisfied because they know there are no solutions up to four million or four billion. They really want to know that there are no solutions up to infinity. And to do that we need a proof. Fermat said he had a proof. Unfortunately, all he ever wrote down was: &quot;I have a truly marvelous demonstration of this proposition which this margin is too narrow to contain.&quot;</p><p><b>What do you mean by a proof?</b></p><p>In a mathematical proof you have a line of reasoning consisting of many, many steps, that are almost self-evident. If the proof we write down is really rigorous, then nobody can ever prove it wrong. There are proofs that date back to the Greeks that are still valid today.</p><p>&quot;I really believed that I was on the right track, but that did not mean that I would necessarily reach my goal.&quot;</p><p><b>So the challenge was to rediscover Fermat&#x27;s proof of the Last Theorem. Why did it become so famous?</b></p><p>Well, some mathematics problems look simple, and you try them for a year or so, and then you try them for a hundred years, and it turns out that they&#x27;re extremely hard to solve. There&#x27;s no reason why these problems shouldn&#x27;t be easy, and yet they turn out to be extremely intricate. The Last Theorem is the most beautiful example of this.</p><p><b>But finding a proof has no applications in the real world; it is a purely abstract question. So why have people put so much effort into finding a proof?</b></p><p>Pure mathematicians just love to try unsolved problems—they love a challenge. And as time passed and no proof was found, it became a real challenge. I&#x27;ve read letters in the early 19th century which said that it was an embarrassment to mathematics that the Last Theorem had not been solved. And of course, it&#x27;s very special because Fermat said that he had a proof.</p>
<p></p>
<figure class="richtext-image full-width">
<img src="https://www.pbs.org/wgbh/nova/media/images/andrew-wiles-fermat-01.width-990_CZwWEYF.jpg" alt="Andrew Wiles being interviewed"/>
<figcaption>Anyone who thinks that mathematics doesn&#x27;t involve passion and emotion should hear directly from Andrew Wiles.

</figcaption>
</figure>
<p></p>
<div class="jsx-21969e986869505b inline-ad enhancement"><div class="jsx-3568597502 content"><div class="jsx-3568597502 ad-block"><h6 class="jsx-3568597502 title">Support Provided By</h6><a target="_blank" aria-label="Learn more about our sponsors" rel="noreferrer" href="https://help.pbs.org/support/solutions/articles/5000677869-online-sponsorship-support/">Learn More</a><div tabindex="0" aria-label="Advertisement" aria-describedby="describe-new-window-0" title="3rd party content" class="jsx-3568597502"><div id="article_short_inline"></div></div></div></div></div>
<p><b>How did you begin looking for the proof?</b></p><p>In my early teens I tried to tackle the problem as I thought Fermat might have tried it. I reckoned that he wouldn&#x27;t have known much more math than I knew as a teenager. Then when I reached college, I realized that many people had thought about the problem during the 18th and 19th centuries and so I studied those methods. But I still wasn&#x27;t getting anywhere. Then when I became a researcher, I decided that I should put the problem aside. It&#x27;s not that I forgot about it—it was always there—but I realized that the only techniques we had to tackle it had been around for 130 years. It didn&#x27;t seem that these techniques were really getting to the root of the problem. The problem with working on Fermat was that you could spend years getting nowhere. It&#x27;s fine to work on any problem, so long as it generates interesting mathematics along the way—even if you don&#x27;t solve it at the end of the day. The definition of a good mathematical problem is the mathematics it generates rather than the problem itself.</p><p><b>It seems that the Last Theorem was considered impossible, and that mathematicians could not risk wasting getting nowhere. But then in 1986 everything changed. A breakthrough by Ken Ribet at the University of California at Berkeley linked Fermat&#x27;s Last Theorem to another unsolved problem, the Taniyama-Shimura conjecture. Can you remember how you reacted to this news?</b></p><p>It was one evening at the end of the summer of 1986 when I was sipping iced tea at the house of a friend. Casually in the middle of a conversation this friend told me that Ken Ribet had proved a link between Taniyama-Shimura and Fermat&#x27;s Last Theorem. I was electrified. I knew that moment that the course of my life was changing because this meant that to prove Fermat&#x27;s Last Theorem all I had to do was to prove the Taniyama-Shimura conjecture. It meant that my childhood dream was now a respectable thing to work on. I just knew that I could never let that go.</p><p><b>So, because Taniyama-Shimura was a modern problem, this meant that working on it, and by implication trying to prove Fermat&#x27;s Last Theorem, was respectable.</b></p><p>Yes. Nobody had any idea how to approach Taniyama-Shimura but at least it was mainstream mathematics. I could try and prove results, which, even if they didn&#x27;t get the whole thing, would be worthwhile mathematics. So the romance of Fermat, which had held me all my life, was now combined with a problem that was professionally acceptable.</p><p></p><p><b>At this point you decided to work in complete isolation. You told nobody that you were embarking on a proof of Fermat&#x27;s Last Theorem. Why was that?</b></p><p>I realized that anything to do with Fermat&#x27;s Last Theorem generates too much interest. You can&#x27;t really focus yourself for years unless you have undivided concentration, which too many spectators would have destroyed.</p><p><b>But presumably you told your wife what you were doing?</b></p><p>My wife&#x27;s only known me while I&#x27;ve been working on Fermat. I told her on our honeymoon, just a few days after we got married. My wife had heard of Fermat&#x27;s Last Theorem, but at that time she had no idea of the romantic significance it had for mathematicians, that it had been such a thorn in our flesh for so many years.</p><p>&quot;There&#x27;s no problem that will mean the same to me.&quot;</p><p><b>On a day-to-day basis, how did you go about constructing your proof?</b></p><p>I used to come up to my study, and start trying to find patterns. I tried doing calculations which explain some little piece of mathematics. I tried to fit it in with some previous broad conceptual understanding of some part of mathematics that would clarify the particular problem I was thinking about. Sometimes that would involve going and looking it up in a book to see how it&#x27;s done there. Sometimes it was a question of modifying things a bit, doing a little extra calculation. And sometimes I realized that nothing that had ever been done before was any use at all. Then I just had to find something completely new; it&#x27;s a mystery where that comes from. I carried this problem around in my head basically the whole time. I would wake up with it first thing in the morning, I would be thinking about it all day, and I would be thinking about it when I went to sleep. Without distraction, I would have the same thing going round and round in my mind. The only way I could relax was when I was with my children. Young children simply aren&#x27;t interested in Fermat. They just want to hear a story and they&#x27;re not going to let you do anything else.</p><p></p><p><b>Usually people work in groups and use each other for support. What did you do when you hit a brick wall?</b></p><p>When I got stuck and I didn&#x27;t know what to do next, I would go out for a walk. I&#x27;d often walk down by the lake. Walking has a very good effect in that you&#x27;re in this state of relaxation, but at the same time you&#x27;re allowing the sub-conscious to work on you. And often if you have one particular thing buzzing in your mind then you don&#x27;t need anything to write with or any desk. I&#x27;d always have a pencil and paper ready and, if I really had an idea, I&#x27;d sit down at a bench and I&#x27;d start scribbling away.</p><p><b>So for seven years you&#x27;re pursuing this proof. Presumably there are periods of self-doubt mixed with the periods of success.</b></p><p>Perhaps I can best describe my experience of doing mathematics in terms of a journey through a dark unexplored mansion. You enter the first room of the mansion and it&#x27;s completely dark. You stumble around bumping into the furniture, but gradually you learn where each piece of furniture is. Finally, after six months or so, you find the light switch, you turn it on, and suddenly it&#x27;s all illuminated. You can see exactly where you were. Then you move into the next room and spend another six months in the dark. So each of these breakthroughs, while sometimes they&#x27;re momentary, sometimes over a period of a day or two, they are the culmination of—and couldn&#x27;t exist without—the many months of stumbling around in the dark that proceed them.</p><p><b>And during those seven years, you could never be sure of achieving a complete proof.</b></p><p>I really believed that I was on the right track, but that did not mean that I would necessarily reach my goal. It could be that the methods needed to take the next step may simply be beyond present day mathematics. Perhaps the methods I needed to complete the proof would not be invented for a hundred years. So even if I was on the right track, I could be living in the wrong century.</p><p></p>
<figure class="richtext-image full-width">
<img src="https://www.pbs.org/wgbh/nova/media/images/andrew-wiles-fermat-02.width-990_XmSDNeI.jpg" alt="Andrew Wiles at blackboard"/>
<figcaption>For eight years, Wiles was utterly obsessed with the challenge of Fermat&#x27;s Last Theorem.

<p></p><h4><b>Then eventually in 1993, you made the crucial breakthrough.</b></h4><p>Yes, it was one morning in late May. My wife, Nada, was out with the children and I was sitting at my desk thinking about the last stage of the proof. I was casually looking at a research paper and there was one sentence that just caught my attention. It mentioned a 19th-century construction, and I suddenly realized that I should be able to use that to complete the proof. I went on into the afternoon and I forgot to go down for lunch, and by about three or four o&#x27;clock, I was really convinced that this would solve the last remaining problem. It got to about tea time and I went downstairs and Nada was very surprised that I&#x27;d arrived so late. Then I told her I&#x27;d solved Fermat&#x27;s Last Theorem.</p><p><b>The New York Times exclaimed &quot;At Last Shout of &#x27;Eureka!&#x27; in Age-Old Math Mystery,&quot; but unknown to them, and to you, there was an error in your proof. What was the error?</b></p><p>It was an error in a crucial part of the argument, but it was something so subtle that I&#x27;d missed it completely until that point. The error is so abstract that it can&#x27;t really be described in simple terms. Even explaining it to a mathematician would require the mathematician to spend two or three months studying that part of the manuscript in great detail.</p><p><b>Eventually, after a year of work, and after inviting the Cambridge mathematician Richard Taylor to work with you on the error, you managed to repair the proof. The question that everybody asks is this; is your proof the same as Fermat&#x27;s?</b></p><p>There&#x27;s no chance of that. Fermat couldn&#x27;t possibly have had this proof. It&#x27;s 150 pages long. It&#x27;s a 20th-century proof. It couldn&#x27;t have been done in the 19th century, let alone the 17th century. The techniques used in this proof just weren&#x27;t around in Fermat&#x27;s time.</p><p><b>So Fermat&#x27;s original proof is still out there somewhere.</b></p><p>I don&#x27;t believe Fermat had a proof. I think he fooled himself into thinking he had a proof. But what has made this problem special for amateurs is that there&#x27;s a tiny possibility that there does exist an elegant 17th-century proof.</p><p></p><p><b>So some mathematicians might continue to look for the original proof. What will you do next?</b></p><p>There&#x27;s no problem that will mean the same to me. Fermat was my childhood passion. There&#x27;s nothing to replace it. I&#x27;ll try other problems. I&#x27;m sure that some of them will be very hard and I&#x27;ll have a sense of achievement again, but nothing will mean the same to me. There&#x27;s no other problem in mathematics that could hold me the way that this one did. There is a sense of melancholy. We&#x27;ve lost something that&#x27;s been with us for so long, and something that drew a lot of us into mathematics. But perhaps that&#x27;s always the way with math problems, and we just have to find new ones to capture our attention. People have told me I&#x27;ve taken away their problem—can&#x27;t I give them something else? I feel some sense of responsibility. I hope that seeing the excitement of solving this problem will make young mathematicians realize that there are lots and lots of other problems in mathematics which are going to be just as challenging in the future.</p><p>&quot;My mind is now at rest.&quot;</p><p><b>What is the main challenge now?</b></p><p>The greatest problem for mathematicians now is probably the Riemann Hypothesis. But it&#x27;s not a problem that can be simply stated.</p><p><b>And is there any one particular thought that remains with you now that Fermat&#x27;s Last Theorem has been laid to rest?</b></p><p>Certainly one thing that I&#x27;ve learned is that it is important to pick a problem based on how much you care about it. However impenetrable it seems, if you don&#x27;t try it, then you can never do it. Always try the problem that matters most to you. I had this rare privilege of being able to pursue in my adult life, what had been my childhood dream. I know it&#x27;s a rare privilege, but if one can really tackle something in adult life that means that much to you, then it&#x27;s more rewarding than anything I can imagine.</p><p><b>And now that journey is over, there must be a certain sadness?</b></p><p>There is a certain sense of sadness, but at the same time there is this tremendous sense of achievement. There&#x27;s also a sense of freedom. I was so obsessed by this problem that I was thinking about it all the time—when I woke up in the morning, when I went to sleep at night—and that went on for eight years. That&#x27;s a long time to think about one thing. That particular odyssey is now over. My mind is now at rest.</p>

was produced for PBS Online by GBH. PBS is a 501(c)(3) not-for-profit organization.<!-- --> <span>© 1996–<!-- -->2026<!-- --> WGBH Educational Foundation</span></small></div></div><svg class="background-logo" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 246.5 68.1"><title>Nova</title><path d="M0 66.4h11.4v-39l41.3 39V1.9H41.1v37.9L0 1.6v64.8zm132.8-64h13.3l17.8 36.4 17.2-36.4h14.5l-31.1 65.4-31.7-65.4zm113.7 63.9h-13.3l-17.8-36.4-17.2 36.4h-14.5L214.8.9l31.7 65.4zM97.9 0c-18.8 0-34 15.2-34 34s15.2 34 34 34 34-15.2 34-34-15.2-34-34-34zm.3 57.4c-12.7 0-23.1-10.3-23.1-23.1s10.3-23.1 23.1-23.1 23.1 10.3 23.1 23.1-10.4 23.1-23.1 23.1z"></path></svg></div></footer></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"data":{"title":"Andrew Wiles on Solving Fermat","slug":"andrew-wiles-fermat","first_published_at":"2000-11-01T00:00:00-05:00","seo_title":"","seo_author":{"@type":"Organization","name":"Nova"},"content":"\u003cdiv class=\"related\"\u003e\u003c/div\u003e\n\u003cp\u003eAndrew Wiles devoted much of his career to proving Fermat's Last Theorem, a challenge that perplexed the best minds in mathematics for 300 years. In 1993, he made front-page headlines when he announced a proof of the problem, but this was not the end of the story; an error in his calculation jeopardized his life's work. In this interview, Wiles recounts how he came to terms with the mistake, and eventually went on to achieve his life's ambition.\u003c/p\u003e\n\u003cp\u003e\u003cb\u003eNOVA: Many great scientific discoveries are the result of obsession, but in your case that obsession has held you since you were a child.\u003c/b\u003e\u003c/p\u003e\u003cp\u003eANDREW WILES: I grew up in Cambridge in England, and my love of mathematics dates from those early childhood days. I loved doing problems in school. I'd take them home and make up new ones of my own. But the best problem I ever found, I found in my local public library. I was just browsing through the section of math books and I found this one book, which was all about one particular problem—Fermat's Last Theorem. This problem had been unsolved by mathematicians for 300 years. It looked so simple, and yet all the great mathematicians in history couldn't solve it. Here was a problem, that I, a 10 year old, could understand, and I knew from that moment that I would never let it go. I had to solve it.\u003c/p\u003e\u003cp\u003e\u003cb\u003eWho was Fermat and what was his Last Theorem?\u003c/b\u003e\u003c/p\u003e\u003cp\u003eFermat was a 17th-century mathematician who wrote a note in the margin of his book stating a particular proposition and claiming to have proved it. His proposition was about an equation which is closely related to Pythagoras' equation. Pythagoras' equation gives you:\u003c/p\u003e\u003cp\u003e\u003ci\u003ex\u003c/i\u003e2 + \u003ci\u003ey\u003c/i\u003e2 = \u003ci\u003ez\u003c/i\u003e2\u003c/p\u003e\u003cp\u003eYou can ask, what are the whole number solutions to this equation, and you can see that:\u003c/p\u003e\u003cp\u003e32 + 42 = 52\u003c/p\u003e\u003cp\u003eand\u003c/p\u003e\u003cp\u003e52 + 122 = 132\u003c/p\u003e\u003cp\u003eAnd if you go on looking then you find more and more such solutions. Fermat then considered the cubed version of this equation:\u003c/p\u003e\u003cp\u003e\u003ci\u003ex\u003c/i\u003e3 + \u003ci\u003ey\u003c/i\u003e3 = \u003ci\u003ez\u003c/i\u003e3\u003c/p\u003e\u003cp\u003eHe raised the question: Can you find solutions to the cubed equation? He claimed that there were none. In fact, he claimed that for the general family of equations:\u003c/p\u003e\u003cp\u003e\u003ci\u003ex\u003c/i\u003en + \u003ci\u003ey\u003c/i\u003en = \u003ci\u003ez\u003c/i\u003en where n is bigger than 2\u003c/p\u003e\u003cp\u003eit is impossible to find a solution. That's Fermat's Last Theorem.\u003c/p\u003e\u003cp\u003e\u003cb\u003eSo Fermat said because he could not find any solutions to this equation, then there were no solutions?\u003c/b\u003e\u003c/p\u003e\u003cp\u003eHe did more than that. Just because we can't find a solution it doesn't mean that there isn't one. Mathematicians aren't satisfied because they know there are no solutions up to four million or four billion. They really want to know that there are no solutions up to infinity. And to do that we need a proof. Fermat said he had a proof. Unfortunately, all he ever wrote down was: \"I have a truly marvelous demonstration of this proposition which this margin is too narrow to contain.\"\u003c/p\u003e\u003cp\u003e\u003cb\u003eWhat do you mean by a proof?\u003c/b\u003e\u003c/p\u003e\u003cp\u003eIn a mathematical proof you have a line of reasoning consisting of many, many steps, that are almost self-evident. If the proof we write down is really rigorous, then nobody can ever prove it wrong. There are proofs that date back to the Greeks that are still valid today.\u003c/p\u003e\u003cp\u003e\"I really believed that I was on the right track, but that did not mean that I would necessarily reach my goal.\"\u003c/p\u003e\u003cp\u003e\u003cb\u003eSo the challenge was to rediscover Fermat's proof of the Last Theorem. Why did it become so famous?\u003c/b\u003e\u003c/p\u003e\u003cp\u003eWell, some mathematics problems look simple, and you try them for a year or so, and then you try them for a hundred years, and it turns out that they're extremely hard to solve. There's no reason why these problems shouldn't be easy, and yet they turn out to be extremely intricate. The Last Theorem is the most beautiful example of this.\u003c/p\u003e\u003cp\u003e\u003cb\u003eBut finding a proof has no applications in the real world; it is a purely abstract question. So why have people put so much effort into finding a proof?\u003c/b\u003e\u003c/p\u003e\u003cp\u003ePure mathematicians just love to try unsolved problems—they love a challenge. And as time passed and no proof was found, it became a real challenge. I've read letters in the early 19th century which said that it was an embarrassment to mathematics that the Last Theorem had not been solved. And of course, it's very special because Fermat said that he had a proof.\u003c/p\u003e\n\u003cp\u003e\u003c/p\u003e\n\u003cfigure class=\"richtext-image full-width\"\u003e\n\u003cimg alt=\"Andrew Wiles being interviewed\" class=\"richtext-image full-width\" src=\"https://www.pbs.org/wgbh/nova/media/images/andrew-wiles-fermat-01.width-990_CZwWEYF.jpg\"/\u003e\n\u003cfigcaption\u003eAnyone who thinks that mathematics doesn't involve passion and emotion should hear directly from Andrew Wiles.\n        \n        \u003cdiv class=\"credit\"\u003e© WGBH Educational Foundation\u003c/div\u003e\n\u003c/figcaption\u003e\n\u003c/figure\u003e\n\u003cp\u003e\u003c/p\u003e\n\u003cdiv class=\"ad\"\u003e\u003c/div\u003e\n\u003cp\u003e\u003cb\u003eHow did you begin looking for the proof?\u003c/b\u003e\u003c/p\u003e\u003cp\u003eIn my early teens I tried to tackle the problem as I thought Fermat might have tried it. I reckoned that he wouldn't have known much more math than I knew as a teenager. Then when I reached college, I realized that many people had thought about the problem during the 18th and 19th centuries and so I studied those methods. But I still wasn't getting anywhere. Then when I became a researcher, I decided that I should put the problem aside. It's not that I forgot about it—it was always there—but I realized that the only techniques we had to tackle it had been around for 130 years. It didn't seem that these techniques were really getting to the root of the problem. The problem with working on Fermat was that you could spend years getting nowhere. It's fine to work on any problem, so long as it generates interesting mathematics along the way—even if you don't solve it at the end of the day. The definition of a good mathematical problem is the mathematics it generates rather than the problem itself.\u003c/p\u003e\u003cp\u003e\u003cb\u003eIt seems that the Last Theorem was considered impossible, and that mathematicians could not risk wasting getting nowhere. But then in 1986 everything changed. A breakthrough by Ken Ribet at the University of California at Berkeley linked Fermat's Last Theorem to another unsolved problem, the Taniyama-Shimura conjecture. Can you remember how you reacted to this news?\u003c/b\u003e\u003c/p\u003e\u003cp\u003eIt was one evening at the end of the summer of 1986 when I was sipping iced tea at the house of a friend. Casually in the middle of a conversation this friend told me that Ken Ribet had proved a link between Taniyama-Shimura and Fermat's Last Theorem. I was electrified. I knew that moment that the course of my life was changing because this meant that to prove Fermat's Last Theorem all I had to do was to prove the Taniyama-Shimura conjecture. It meant that my childhood dream was now a respectable thing to work on. I just knew that I could never let that go.\u003c/p\u003e\u003cp\u003e\u003cb\u003eSo, because Taniyama-Shimura was a modern problem, this meant that working on it, and by implication trying to prove Fermat's Last Theorem, was respectable.\u003c/b\u003e\u003c/p\u003e\u003cp\u003eYes. Nobody had any idea how to approach Taniyama-Shimura but at least it was mainstream mathematics. I could try and prove results, which, even if they didn't get the whole thing, would be worthwhile mathematics. So the romance of Fermat, which had held me all my life, was now combined with a problem that was professionally acceptable.\u003c/p\u003e\u003cp\u003e\u003c/p\u003e\u003cp\u003e\u003cb\u003eAt this point you decided to work in complete isolation. You told nobody that you were embarking on a proof of Fermat's Last Theorem. Why was that?\u003c/b\u003e\u003c/p\u003e\u003cp\u003eI realized that anything to do with Fermat's Last Theorem generates too much interest. You can't really focus yourself for years unless you have undivided concentration, which too many spectators would have destroyed.\u003c/p\u003e\u003cp\u003e\u003cb\u003eBut presumably you told your wife what you were doing?\u003c/b\u003e\u003c/p\u003e\u003cp\u003eMy wife's only known me while I've been working on Fermat. I told her on our honeymoon, just a few days after we got married. My wife had heard of Fermat's Last Theorem, but at that time she had no idea of the romantic significance it had for mathematicians, that it had been such a thorn in our flesh for so many years.\u003c/p\u003e\u003cp\u003e\"There's no problem that will mean the same to me.\"\u003c/p\u003e\u003cp\u003e\u003cb\u003eOn a day-to-day basis, how did you go about constructing your proof?\u003c/b\u003e\u003c/p\u003e\u003cp\u003eI used to come up to my study, and start trying to find patterns. I tried doing calculations which explain some little piece of mathematics. I tried to fit it in with some previous broad conceptual understanding of some part of mathematics that would clarify the particular problem I was thinking about. Sometimes that would involve going and looking it up in a book to see how it's done there. Sometimes it was a question of modifying things a bit, doing a little extra calculation. And sometimes I realized that nothing that had ever been done before was any use at all. Then I just had to find something completely new; it's a mystery where that comes from. I carried this problem around in my head basically the whole time. I would wake up with it first thing in the morning, I would be thinking about it all day, and I would be thinking about it when I went to sleep. Without distraction, I would have the same thing going round and round in my mind. The only way I could relax was when I was with my children. Young children simply aren't interested in Fermat. They just want to hear a story and they're not going to let you do anything else.\u003c/p\u003e\u003cp\u003e\u003c/p\u003e\u003cp\u003e\u003cb\u003eUsually people work in groups and use each other for support. What did you do when you hit a brick wall?\u003c/b\u003e\u003c/p\u003e\u003cp\u003eWhen I got stuck and I didn't know what to do next, I would go out for a walk. I'd often walk down by the lake. Walking has a very good effect in that you're in this state of relaxation, but at the same time you're allowing the sub-conscious to work on you. And often if you have one particular thing buzzing in your mind then you don't need anything to write with or any desk. I'd always have a pencil and paper ready and, if I really had an idea, I'd sit down at a bench and I'd start scribbling away.\u003c/p\u003e\u003cp\u003e\u003cb\u003eSo for seven years you're pursuing this proof. Presumably there are periods of self-doubt mixed with the periods of success.\u003c/b\u003e\u003c/p\u003e\u003cp\u003ePerhaps I can best describe my experience of doing mathematics in terms of a journey through a dark unexplored mansion. You enter the first room of the mansion and it's completely dark. You stumble around bumping into the furniture, but gradually you learn where each piece of furniture is. Finally, after six months or so, you find the light switch, you turn it on, and suddenly it's all illuminated. You can see exactly where you were. Then you move into the next room and spend another six months in the dark. So each of these breakthroughs, while sometimes they're momentary, sometimes over a period of a day or two, they are the culmination of—and couldn't exist without—the many months of stumbling around in the dark that proceed them.\u003c/p\u003e\u003cp\u003e\u003cb\u003eAnd during those seven years, you could never be sure of achieving a complete proof.\u003c/b\u003e\u003c/p\u003e\u003cp\u003eI really believed that I was on the right track, but that did not mean that I would necessarily reach my goal. It could be that the methods needed to take the next step may simply be beyond present day mathematics. Perhaps the methods I needed to complete the proof would not be invented for a hundred years. So even if I was on the right track, I could be living in the wrong century.\u003c/p\u003e\u003cp\u003e\u003c/p\u003e\n\u003cfigure class=\"richtext-image full-width\"\u003e\n\u003cimg alt=\"Andrew Wiles at blackboard\" class=\"richtext-image full-width\" src=\"https://www.pbs.org/wgbh/nova/media/images/andrew-wiles-fermat-02.width-990_XmSDNeI.jpg\"/\u003e\n\u003cfigcaption\u003eFor eight years, Wiles was utterly obsessed with the challenge of Fermat's Last Theorem.\n        \n        \u003cdiv class=\"credit\"\u003e© WGBH Educational Foundation\u003c/div\u003e\n\u003c/figcaption\u003e\n\u003c/figure\u003e\n\u003cp\u003e\u003c/p\u003e\u003ch4\u003e\u003cb\u003eThen eventually in 1993, you made the crucial breakthrough.\u003c/b\u003e\u003c/h4\u003e\u003cp\u003eYes, it was one morning in late May. My wife, Nada, was out with the children and I was sitting at my desk thinking about the last stage of the proof. I was casually looking at a research paper and there was one sentence that just caught my attention. It mentioned a 19th-century construction, and I suddenly realized that I should be able to use that to complete the proof. I went on into the afternoon and I forgot to go down for lunch, and by about three or four o'clock, I was really convinced that this would solve the last remaining problem. It got to about tea time and I went downstairs and Nada was very surprised that I'd arrived so late. Then I told her I'd solved Fermat's Last Theorem.\u003c/p\u003e\u003cp\u003e\u003cb\u003eThe New York Times exclaimed \"At Last Shout of 'Eureka!' in Age-Old Math Mystery,\" but unknown to them, and to you, there was an error in your proof. What was the error?\u003c/b\u003e\u003c/p\u003e\u003cp\u003eIt was an error in a crucial part of the argument, but it was something so subtle that I'd missed it completely until that point. The error is so abstract that it can't really be described in simple terms. Even explaining it to a mathematician would require the mathematician to spend two or three months studying that part of the manuscript in great detail.\u003c/p\u003e\u003cp\u003e\u003cb\u003eEventually, after a year of work, and after inviting the Cambridge mathematician Richard Taylor to work with you on the error, you managed to repair the proof. The question that everybody asks is this; is your proof the same as Fermat's?\u003c/b\u003e\u003c/p\u003e\u003cp\u003eThere's no chance of that. Fermat couldn't possibly have had this proof. It's 150 pages long. It's a 20th-century proof. It couldn't have been done in the 19th century, let alone the 17th century. The techniques used in this proof just weren't around in Fermat's time.\u003c/p\u003e\u003cp\u003e\u003cb\u003eSo Fermat's original proof is still out there somewhere.\u003c/b\u003e\u003c/p\u003e\u003cp\u003eI don't believe Fermat had a proof. I think he fooled himself into thinking he had a proof. But what has made this problem special for amateurs is that there's a tiny possibility that there does exist an elegant 17th-century proof.\u003c/p\u003e\u003cp\u003e\u003c/p\u003e\u003cp\u003e\u003cb\u003eSo some mathematicians might continue to look for the original proof. What will you do next?\u003c/b\u003e\u003c/p\u003e\u003cp\u003eThere's no problem that will mean the same to me. Fermat was my childhood passion. There's nothing to replace it. I'll try other problems. I'm sure that some of them will be very hard and I'll have a sense of achievement again, but nothing will mean the same to me. There's no other problem in mathematics that could hold me the way that this one did. There is a sense of melancholy. We've lost something that's been with us for so long, and something that drew a lot of us into mathematics. But perhaps that's always the way with math problems, and we just have to find new ones to capture our attention. People have told me I've taken away their problem—can't I give them something else? I feel some sense of responsibility. I hope that seeing the excitement of solving this problem will make young mathematicians realize that there are lots and lots of other problems in mathematics which are going to be just as challenging in the future.\u003c/p\u003e\u003cp\u003e\"My mind is now at rest.\"\u003c/p\u003e\u003cp\u003e\u003cb\u003eWhat is the main challenge now?\u003c/b\u003e\u003c/p\u003e\u003cp\u003eThe greatest problem for mathematicians now is probably the Riemann Hypothesis. But it's not a problem that can be simply stated.\u003c/p\u003e\u003cp\u003e\u003cb\u003eAnd is there any one particular thought that remains with you now that Fermat's Last Theorem has been laid to rest?\u003c/b\u003e\u003c/p\u003e\u003cp\u003eCertainly one thing that I've learned is that it is important to pick a problem based on how much you care about it. However impenetrable it seems, if you don't try it, then you can never do it. Always try the problem that matters most to you. I had this rare privilege of being able to pursue in my adult life, what had been my childhood dream. I know it's a rare privilege, but if one can really tackle something in adult life that means that much to you, then it's more rewarding than anything I can imagine.\u003c/p\u003e\u003cp\u003e\u003cb\u003eAnd now that journey is over, there must be a certain sadness?\u003c/b\u003e\u003c/p\u003e\u003cp\u003eThere is a certain sense of sadness, but at the same time there is this tremendous sense of achievement. There's also a sense of freedom. I was so obsessed by this problem that I was thinking about it all the time—when I woke up in the morning, when I went to sleep at night—and that went on for eight years. That's a long time to think about one thing. That particular odyssey is now over. My mind is now at rest.\u003c/p\u003e\n\u003cdiv class=\"newsletter\"\u003e\u003c/div\u003e","brand":{"name":"NOVA","slug":"nova"},"topic":{"name":"Physics \u0026 Math","slug":"physics"},"short_description":"\u003cp\u003eWiles describes his career-long quest to prove Fermat's Last Theorem, the world's most famous mathematical problem.\u003c/p\u003e","long_description":"\u003cp\u003eWiles describes his career-long quest to prove Fermat's Last Theorem, the world's most famous mathematical problem.\u003c/p\u003e","aggregation_url":null,"author":[],"editor":null,"editor_resource_note":"\u003cp\u003eThis feature originally appeared on the site for the NOVA program \u003ca href=\"http://www.pbs.org/wgbh/nova/proof/\"\u003eThe Proof\u003c/a\u003e.\u003c/p\u003e","hero_image":null,"sources":"\u003cdiv class=\"rich-text\"\u003e\u003c/div\u003e","related_content":[{"content_type":"article","topic":"physics","brand":"nova","length":null,"title":"Math's Hidden Woman","slug":"sophie-germain","part_of_a_series":null,"hero_image":{"mime_type":"image/jpeg","alt_text":"","caption":{"html":"Sophie Germain, while memorialized today as a luminary in the history of mathematics, was relatively unrecognized in her own day.","plaintext":"Sophie Germain, while memorialized today as a luminary in the history of mathematics, was relatively unrecognized in her own day."},"credit":{"html":"Archives de l'Academie des Sciences","plaintext":"Archives de l'Academie des Sciences"},"src":"https://www.pbs.org/wgbh/nova/media/original_images/sophie-germain-01.jpg","renditions":[{"width":448,"height":480,"src":"https://www.pbs.org/wgbh/nova/media/images/sophie-germain-01.width-600.jpg","contentType":"application/vnd.theseus+scaled_image"},{"width":448,"height":480,"src":"https://www.pbs.org/wgbh/nova/media/images/sophie-germain-01.width-800.jpg","contentType":"application/vnd.theseus+scaled_image"},{"width":448,"height":480,"src":"https://www.pbs.org/wgbh/nova/media/images/sophie-germain-01.width-1500.jpg","contentType":"application/vnd.theseus+scaled_image"},{"width":448,"height":480,"src":"https://www.pbs.org/wgbh/nova/media/images/sophie-germain-01.width-2000.jpg","contentType":"application/vnd.theseus+scaled_image"},{"width":448,"height":480,"src":"https://www.pbs.org/wgbh/nova/media/images/sophie-germain-01.width-2500.jpg","contentType":
